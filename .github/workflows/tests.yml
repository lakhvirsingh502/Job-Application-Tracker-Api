name: Run FastAPI Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      Test_Database_Url: postgresql://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Download project code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Check environment variables
        run: |
          python -c "import os; print('DATABASE_URL exists:', bool(os.getenv('Database_Url')))"
          python -c "import os; print('SECRET_KEY exists:', bool(os.getenv('SECRET_KEY')))"

      - name: Run tests
        run: python -m pytest
  deploy:
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/Job-Application-Tracker-Api
            git pull origin master
            sudo docker compose up --build -d
            sudo docker ps